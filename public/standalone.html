<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculus Agent - Powered by GPT-4 Vision</title>
  
  <!-- KaTeX CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: hsl(240, 10%, 8%);
      color: hsl(240, 5%, 96%);
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      border-bottom: 1px solid hsl(240, 6%, 20%);
      background: hsl(240, 8%, 12%);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-icon {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.5rem;
      background: linear-gradient(135deg, hsl(263, 70%, 65%), hsl(280, 70%, 70%));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .header-title {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .header-subtitle {
      font-size: 0.75rem;
      color: hsl(240, 5%, 65%);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .messages-container {
      max-width: 56rem;
      margin: 0 auto;
    }

    .message {
      display: flex;
      margin-bottom: 1rem;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 80%;
      padding: 1rem 1.5rem;
      border-radius: 1rem;
      line-height: 1.6;
    }

    .message.user .message-content {
      background: hsl(263, 70%, 65%);
      color: hsl(240, 5%, 96%);
      box-shadow: 0 0 40px hsl(263, 70%, 65%, 0.15);
    }

    .message.assistant .message-content {
      background: hsl(240, 6%, 20%);
      color: hsl(240, 5%, 96%);
    }

    .message-image {
      max-width: 100%;
      border-radius: 0.5rem;
      margin-bottom: 0.75rem;
      border: 1px solid hsl(240, 6%, 20%);
    }

    .section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid hsla(240, 6%, 20%, 0.5);
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      opacity: 0.8;
    }

    .expression-box {
      font-family: monospace;
      background: hsla(240, 10%, 8%, 0.3);
      border-radius: 0.375rem;
      padding: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .loading {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      background: hsl(240, 6%, 20%);
      border-radius: 1rem;
      width: fit-content;
    }

    .loading-dot {
      width: 0.5rem;
      height: 0.5rem;
      background: hsl(240, 5%, 65%);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .loading-dot:nth-child(1) { animation-delay: -0.32s; }
    .loading-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .input-area {
      border-top: 1px solid hsl(240, 6%, 20%);
      background: hsl(240, 8%, 12%);
      padding: 1rem;
    }

    .preview-container {
      margin-bottom: 0.75rem;
      position: relative;
      display: inline-block;
    }

    .preview-image {
      max-height: 8rem;
      border-radius: 0.5rem;
      border: 1px solid hsl(240, 6%, 20%);
    }

    .preview-close {
      position: absolute;
      top: -0.5rem;
      right: -0.5rem;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 50%;
      background: hsl(0, 63%, 55%);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    button {
      background: hsl(240, 6%, 20%);
      border: none;
      color: hsl(240, 5%, 96%);
      padding: 0.75rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:hover {
      background: hsl(240, 6%, 25%);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button.primary {
      background: hsl(263, 70%, 65%);
    }

    button.primary:hover {
      background: hsl(263, 70%, 60%);
    }

    textarea {
      flex: 1;
      background: hsl(240, 6%, 20%);
      border: none;
      color: hsl(240, 5%, 96%);
      padding: 0.75rem;
      border-radius: 0.5rem;
      resize: none;
      font-family: inherit;
      font-size: 0.875rem;
      min-height: 3rem;
    }

    textarea:focus {
      outline: 2px solid hsl(263, 70%, 65%);
    }

    textarea::placeholder {
      color: hsl(240, 5%, 65%);
    }

    input[type="file"] {
      display: none;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: hsl(240, 10%, 8%);
    }

    ::-webkit-scrollbar-thumb {
      background: hsl(240, 6%, 20%);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: hsl(240, 5%, 65%);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="header-icon">🧮</div>
      <div>
        <div class="header-title">Calculus Agent</div>
        <div class="header-subtitle">Powered by GPT-4 Vision + SymPy</div>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="messages-container" id="messages-container"></div>
    </div>

    <div class="input-area">
      <div id="preview-container"></div>
      <div class="input-row">
        <input type="file" id="file-input" accept="image/*">
        <input type="file" id="camera-input" accept="image/*" capture="environment">
        
        <button onclick="document.getElementById('file-input').click()" id="image-btn">
          📷
        </button>
        
        <button onclick="document.getElementById('camera-input').click()" id="camera-btn">
          📸
        </button>
        
        <textarea 
          id="input" 
          placeholder="Type a calculus problem or upload an image..."
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
        ></textarea>
        
        <button onclick="sendMessage()" class="primary" id="send-btn">
          ➤
        </button>
      </div>
    </div>
  </div>

  <!-- React and KaTeX from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <script>
    // ===== CONFIG =====
    const LAMBDA_URL = 'YOUR_LAMBDA_FUNCTION_URL_HERE';

    // ===== STATE =====
    let messages = [
      {
        role: 'assistant',
        content: "Hello! I'm your calculus assistant. I can help you solve calculus problems. You can type a problem, paste it, or upload/capture an image of it!"
      }
    ];
    let isLoading = false;
    let selectedImage = null;
    let previewUrl = null;

    // ===== RENDER =====
    function renderMessages() {
      const container = document.getElementById('messages-container');
      container.innerHTML = '';

      messages.forEach(msg => {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${msg.role}`;

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';

        if (msg.imageUrl) {
          const img = document.createElement('img');
          img.src = msg.imageUrl;
          img.className = 'message-image';
          contentDiv.appendChild(img);
        }

        const textDiv = document.createElement('div');
        textDiv.innerHTML = renderMath(msg.content);
        contentDiv.appendChild(textDiv);

        if (msg.expression) {
          const section = document.createElement('div');
          section.className = 'section';
          section.innerHTML = `
            <div class="section-title">Expression:</div>
            <div class="expression-box">${renderMath('$$' + msg.expression + '$$')}</div>
          `;
          contentDiv.appendChild(section);
        }

        if (msg.result) {
          const section = document.createElement('div');
          section.className = 'section';
          section.innerHTML = `
            <div class="section-title">Result:</div>
            <div style="font-weight: 600;">${renderMath(msg.result)}</div>
          `;
          contentDiv.appendChild(section);
        }

        if (msg.steps) {
          const section = document.createElement('div');
          section.className = 'section';
          section.innerHTML = `
            <div class="section-title">Step-by-step solution:</div>
            <div>${renderMath(msg.steps)}</div>
          `;
          contentDiv.appendChild(section);
        }

        messageDiv.appendChild(contentDiv);
        container.appendChild(messageDiv);
      });

      if (isLoading) {
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message assistant';
        loadingDiv.innerHTML = `
          <div class="loading">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
          </div>
        `;
        container.appendChild(loadingDiv);
      }

      // Scroll to bottom
      const messagesEl = document.getElementById('messages');
      messagesEl.scrollTop = messagesEl.scrollHeight;

      // Render KaTeX
      renderMathInElement(container, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$', right: '$', display: false},
        ]
      });
    }

    function renderMath(text) {
      return text;
    }

    // ===== IMAGE HANDLING =====
    document.getElementById('file-input').addEventListener('change', handleFileSelect);
    document.getElementById('camera-input').addEventListener('change', handleFileSelect);

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 10 * 1024 * 1024) {
        alert('Image too large. Please select an image under 10MB.');
        return;
      }

      selectedImage = file;
      previewUrl = URL.createObjectURL(file);
      
      const container = document.getElementById('preview-container');
      container.className = 'preview-container';
      container.innerHTML = `
        <img src="${previewUrl}" class="preview-image">
        <button class="preview-close" onclick="clearImage()">×</button>
      `;
    }

    function clearImage() {
      selectedImage = null;
      if (previewUrl) URL.revokeObjectURL(previewUrl);
      previewUrl = null;
      document.getElementById('preview-container').innerHTML = '';
      document.getElementById('file-input').value = '';
      document.getElementById('camera-input').value = '';
    }

    // ===== SEND MESSAGE =====
    async function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();

      if ((!text && !selectedImage) || isLoading) return;

      // Add user message
      const userMessage = {
        role: 'user',
        content: text || 'Solve this problem',
        imageUrl: previewUrl
      };
      messages.push(userMessage);

      // Clear input
      input.value = '';
      const imageFile = selectedImage;
      selectedImage = null;
      previewUrl = null;
      document.getElementById('preview-container').innerHTML = '';

      isLoading = true;
      renderMessages();

      try {
        let imageBase64;
        if (imageFile) {
          imageBase64 = await fileToBase64(imageFile);
        }

        const response = await fetch(LAMBDA_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text,
            image: imageBase64
          })
        });

        if (!response.ok) {
          throw new Error(`Lambda error: ${response.status}`);
        }

        const data = await response.json();

        messages.push({
          role: 'assistant',
          content: "Here's the solution:",
          expression: data.expression,
          result: data.result,
          steps: data.steps
        });
      } catch (error) {
        console.error('Error:', error);
        messages.push({
          role: 'assistant',
          content: 'Sorry, I encountered an error processing your request. Please make sure the Lambda function URL is configured.'
        });
      }

      isLoading = false;
      renderMessages();
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = reader.result;
          const base64 = result.split(',')[1];
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ===== INIT =====
    renderMessages();
  </script>
</body>
</html>
