<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Tutor Agent - Powered by GPT-4 Vision</title>
  
  <!-- KaTeX CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #212121;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      border-bottom: 1px solid #2f2f2f;
      background: #212121;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-icon {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.5rem;
      background: linear-gradient(135deg, #10b981, #14b8a6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .header-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
    }

    .header-subtitle {
      font-size: 0.75rem;
      color: #8e8e8e;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .messages-container {
      max-width: 56rem;
      margin: 0 auto;
    }

    .message {
      display: flex;
      margin-bottom: 1rem;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 80%;
      padding: 1rem 1.5rem;
      border-radius: 1rem;
      line-height: 1.6;
    }

    .message.user .message-content {
      background: #2f2f2f;
      color: #fff;
    }

    .message.assistant .message-content {
      background: #2f2f2f;
      color: #fff;
    }

    .message-image {
      max-width: 100%;
      border-radius: 0.5rem;
      margin-bottom: 0.75rem;
      border: 1px solid #444;
    }

    .section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #444;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #8e8e8e;
    }

    .expression-box {
      font-family: monospace;
      background: #1a1a1a;
      border-radius: 0.375rem;
      padding: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .loading {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      background: #2f2f2f;
      border-radius: 1rem;
      width: fit-content;
    }

    .loading-dot {
      width: 0.5rem;
      height: 0.5rem;
      background: #8e8e8e;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .loading-dot:nth-child(1) { animation-delay: -0.32s; }
    .loading-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .input-area {
      border-top: 1px solid #2f2f2f;
      background: #212121;
      padding: 1rem;
    }

    .input-container-wrapper {
      max-width: 48rem;
      margin: 0 auto;
    }

    .preview-container {
      margin-bottom: 0.75rem;
      position: relative;
      display: inline-block;
    }

    .preview-image {
      max-height: 8rem;
      border-radius: 0.5rem;
      border: 1px solid #444;
    }

    .preview-close {
      position: absolute;
      top: -0.5rem;
      right: -0.5rem;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 50%;
      background: #dc2626;
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1.25rem;
    }

    .preview-close:hover {
      background: #b91c1c;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .input-container {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #2f2f2f;
      border: 1px solid #444;
      border-radius: 1.5rem;
      padding: 0.75rem 1rem;
    }

    .icon-btn {
      background: none;
      border: none;
      color: #8e8e8e;
      padding: 0.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .icon-btn:hover {
      color: #fff;
    }

    .icon-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .icon-btn svg {
      width: 1.25rem;
      height: 1.25rem;
    }

    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-family: inherit;
      font-size: 0.9375rem;
      outline: none;
    }

    input[type="text"]::placeholder {
      color: #8e8e8e;
    }

    input[type="text"]:disabled {
      opacity: 0.5;
    }

    .send-btn {
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      background: #fff;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      background: #e5e5e5;
    }

    .send-btn:disabled {
      background: #676767;
      opacity: 0.5;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 1rem;
      height: 1rem;
      color: #000;
    }

    input[type="file"] {
      display: none;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #212121;
    }

    ::-webkit-scrollbar-thumb {
      background: #2f2f2f;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #8e8e8e;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="header-icon">🧮</div>
      <div>
        <div class="header-title">Math Tutor Agent</div>
        <div class="header-subtitle">Powered by GPT-4 Vision + SymPy</div>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="messages-container" id="messages-container"></div>
    </div>

    <div class="input-area">
      <div class="input-container-wrapper">
        <div id="preview-container"></div>
        <div class="input-row">
          <input type="file" id="file-input" accept="image/*">
          
          <div class="input-container">
            <input 
              type="text"
              id="input" 
              placeholder="Message Math Tutor Agent"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
            />
            
            <button class="icon-btn" onclick="document.getElementById('file-input').click()" id="attach-btn" aria-label="Attach file">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
          </div>
          
          <button class="send-btn" onclick="sendMessage()" id="send-btn" aria-label="Send message">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m5 12 7-7 7 7"/>
              <path d="M12 19V5"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- React and KaTeX from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <script>
    // ===== CONFIG =====
  const LAMBDA_URL = (typeof localStorage !== 'undefined' && localStorage.getItem('lambda_url')) ||
    'https://cdyibmzy64skc2ikp74qebsicq0nggic.lambda-url.us-east-1.on.aws/';

    // ===== STATE =====
    let messages = [
      {
        role: 'assistant',
        content: "Hello! I'm your math tutor. I can help you work through math problems. You can type a question, paste it, or upload/capture an image of it!"
      }
    ];
    let isLoading = false;
    let selectedImage = null;
    let previewUrl = null;

    // ===== RENDER =====
    function renderMessages() {
      const container = document.getElementById('messages-container');
      container.innerHTML = '';

      messages.forEach(msg => {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${msg.role}`;

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';

        if (msg.imageUrl) {
          const img = document.createElement('img');
          img.src = msg.imageUrl;
          img.className = 'message-image';
          contentDiv.appendChild(img);
        }

        const textDiv = document.createElement('div');
        textDiv.innerHTML = renderMath(msg.content);
        contentDiv.appendChild(textDiv);

        if (msg.expression) {
          const section = document.createElement('div');
          section.className = 'section';
          section.innerHTML = `
            <div class="section-title">Expression:</div>
            <div class="expression-box">${renderMath('$$' + msg.expression + '$$')}</div>
          `;
          contentDiv.appendChild(section);
        }

        if (msg.result) {
          const section = document.createElement('div');
          section.className = 'section';
          section.innerHTML = `
            <div class="section-title">Result:</div>
            <div style="font-weight: 600;">${renderMath(msg.result)}</div>
          `;
          contentDiv.appendChild(section);
        }

        if (msg.steps) {
          const section = document.createElement('div');
          section.className = 'section';
          section.innerHTML = `
            <div class="section-title">Step-by-step solution:</div>
            <div>${renderMath(msg.steps)}</div>
          `;
          contentDiv.appendChild(section);
        }

        messageDiv.appendChild(contentDiv);
        container.appendChild(messageDiv);
      });

      if (isLoading) {
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message assistant';
        loadingDiv.innerHTML = `
          <div class="loading">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
          </div>
        `;
        container.appendChild(loadingDiv);
      }

      // Scroll to bottom
      const messagesEl = document.getElementById('messages');
      messagesEl.scrollTop = messagesEl.scrollHeight;

      // Render KaTeX
      renderMathInElement(container, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$', right: '$', display: false},
        ]
      });
    }

    function renderMath(text) {
      return text;
    }

    // ===== IMAGE HANDLING =====
    document.getElementById('file-input').addEventListener('change', handleFileSelect);

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 10 * 1024 * 1024) {
        alert('Image too large. Please select an image under 10MB.');
        return;
      }

      selectedImage = file;
      previewUrl = URL.createObjectURL(file);
      
      const container = document.getElementById('preview-container');
      container.className = 'preview-container';
      container.innerHTML = `
        <img src="${previewUrl}" class="preview-image">
        <button class="preview-close" onclick="clearImage()">×</button>
      `;
    }

    function clearImage() {
      selectedImage = null;
      if (previewUrl) URL.revokeObjectURL(previewUrl);
      previewUrl = null;
      document.getElementById('preview-container').innerHTML = '';
      document.getElementById('file-input').value = '';
    }

    // ===== SEND MESSAGE =====
    async function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();

      if ((!text && !selectedImage) || isLoading) return;

      // Add user message
      const userMessage = {
        role: 'user',
        content: text || 'Solve this problem',
        imageUrl: previewUrl
      };
      messages.push(userMessage);

      // Clear input
      input.value = '';
      const imageFile = selectedImage;
      selectedImage = null;
      previewUrl = null;
      document.getElementById('preview-container').innerHTML = '';

      isLoading = true;
      renderMessages();

      try {
        let imageBase64;
        if (imageFile) {
          imageBase64 = await fileToBase64(imageFile);
        }

        const response = await fetch(LAMBDA_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text,
            image: imageBase64
          })
        });

        if (!response.ok) {
          throw new Error(`Lambda error: ${response.status}`);
        }

        const data = await response.json();

        messages.push({
          role: 'assistant',
          content: "Here's the solution:",
          expression: data.expression,
          result: data.result,
          steps: data.steps
        });
      } catch (error) {
        console.error('Error:', error);
        messages.push({
          role: 'assistant',
          content: 'Sorry, I encountered an error processing your request. Please make sure the Lambda function URL is configured.'
        });
      }

      isLoading = false;
      renderMessages();
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = reader.result;
          const base64 = result.split(',')[1];
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ===== INIT =====
    renderMessages();
  </script>
</body>
</html>
