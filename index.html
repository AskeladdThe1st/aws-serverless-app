  <body>
    <script>
      // Define legacy globals early to prevent ReferenceErrors before the bundle loads
      window.PERSONA_OPTIONS = window.PERSONA_OPTIONS || [];
      window.PRESET_AVATARS = window.PRESET_AVATARS || [];
      window.AVAILABLE_AVATARS = window.AVAILABLE_AVATARS || [];
      window.DEFAULT_AVATARS = window.DEFAULT_AVATARS || { user: null, tutor: null };
      window.DEFAULT_AVATAR = window.DEFAULT_AVATAR || null;
      window.PERSONA_LIST = window.PERSONA_LIST || [];
      window.profile = window.profile || {};
      window.getPersonaAccess =
        window.getPersonaAccess || (() => ({ tier: "guest" }));
      window.handlePersonaChange =
        window.handlePersonaChange || (() => {});
      window.handlePersonaSelect =
        window.handlePersonaSelect || ((persona) => window.handlePersonaChange?.(persona));
      window.handlePersonaLockedSelect =
        window.handlePersonaLockedSelect || ((persona) => window.handlePersonaSelect?.(persona));
      window.handleAvatarSelect = window.handleAvatarSelect || (() => {});
      window.handleAvatarLockedSelect =
        window.handleAvatarLockedSelect || ((avatar) => window.handleAvatarSelect?.(avatar));
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
